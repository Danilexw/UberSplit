<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UberSplit | Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="uberspliticon.png">
</head>

<div id="modal-relatorio" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Relatório de Fechamento</h2>
            <button onclick="ui.fecharModal()" class="btn-close">&times;</button>
        </div>
        <div id="corpo-relatorio" class="modal-body">
            </div>
        <div class="modal-footer">
            <button onclick="ui.confirmarFechamento()" class="btn-primary">Confirmar e Zerar Dívidas</button>
            <p class="aviso-footer">Isso marcará todas as suas pendências atuais como PAGAS.</p>
        </div>
    </div>
</div>

<div id="modal-editar" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Editar Corrida</h2>
            <button onclick="ui.fecharModalEditar()" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label>Valor Total da Corrida</label>
                <input type="number" id="edit-valor" step="0.01" placeholder="R$ 0,00">
            </div>
            
            <div class="input-group" style="margin-top: 20px;">
                <label>Quem participou?</label>
                <div id="edit-lista-amigos" class="checkbox-grid">
                    </div>
            </div>
        </div>
        <div class="modal-footer">
            <button id="btn-salvar-edicao" class="btn-primary">Salvar Alterações</button>
        </div>
    </div>
</div>

<body>
    <nav class="navbar">
    <div class="logo-container">
        <img src="uberspliticon.png" alt="UberSplit Logo" class="nav-logo-img">
    </div>
    <div id="user-info" class="user-greeting">Carregando...</div>
    <button onclick="logout()" class="btn-outline">Sair</button>
</nav>

    <main class="container">
        <section class="quick-add">
            <h3>Nova Corrida</h3>
            <div class="card-form">
                <div class="input-group">
                    <label for="valor">Quanto custou a corrida?</label>
                    <input type="number" id="valor" placeholder="R$ 0,00" step="0.01">
                </div>

                <div class="participants-section">
                    <p class="label-small">Quem estava no carro com você?</p>
                    <div id="lista-usuarios-checkbox" class="checkbox-group">
                        <small>Buscando amigos no banco...</small>
                    </div>
                </div>

                <button onclick="ui.handleCreateRide()" class="btn-primary">Dividir e Registrar</button>
            </div>
        </section>

        <section class="stats">
    <small>Seu saldo devedor</small>
    <h2 id="total-pendente">R$ 0,00</h2>
    
    <button onclick="ui.mostrarRelatorioSemanal()" class="btn-fechamento">
        Gerar Relatório Semanal
    </button>

    <div id="detalhe-dividas" class="user-tabs"></div>
</section>

        <section class="history">
            <h3>Histórico de Corridas</h3>
            <div id="lista-dividas" class="list-container">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
