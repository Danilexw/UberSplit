<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <header>
    <h1>🚗 Controle de Corridas</h1>
    <button class="logout" onclick="logout()">Sair</button>
  </header>

  <!-- Nova corrida -->
  <section class="card">
    <h2>Nova Corrida</h2>

    <input type="number" id="valor" placeholder="Valor total (R$)">
    <input type="text" id="participantes" placeholder="Ex: joao,maria,pedro">

    <button onclick="criarCorrida()">Criar Corrida</button>
  </section>

  <!-- Lista -->
  <section class="card">
    <h2>💰 Dívidas</h2>

    <div id="lista" class="lista">
      <!-- preenchido via JS -->
    </div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
